apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.app.namespace }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>DevOps Central</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
          min-height: 100vh;
          color: #fff;
          overflow-x: hidden;
        }
        
        .container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 2rem;
        }
        
        header {
          text-align: center;
          padding: 3rem 0;
          animation: fadeInDown 0.8s ease-out;
        }
        
        .logo {
          font-size: 3rem;
          font-weight: 700;
          background: linear-gradient(90deg, #00d9ff, #00ff88, #00d9ff);
          background-size: 200% auto;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradient 3s linear infinite;
        }
        
        .subtitle {
          color: #8892b0;
          margin-top: 0.5rem;
          font-size: 1.1rem;
        }
        
        .status-badge {
          display: inline-block;
          padding: 0.5rem 1.5rem;
          background: rgba(0, 255, 136, 0.15);
          border: 1px solid #00ff88;
          border-radius: 50px;
          color: #00ff88;
          margin-top: 1.5rem;
          animation: pulse 2s infinite;
        }
        
        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 1.5rem;
          margin-top: 3rem;
        }
        
        .card {
          background: rgba(255, 255, 255, 0.05);
          backdrop-filter: blur(10px);
          border-radius: 16px;
          padding: 2rem;
          border: 1px solid rgba(255, 255, 255, 0.1);
          transition: all 0.3s ease;
          animation: fadeInUp 0.6s ease-out;
        }
        
        .card:hover {
          transform: translateY(-5px);
          border-color: #00d9ff;
          box-shadow: 0 20px 40px rgba(0, 217, 255, 0.15);
        }
        
        .card-icon {
          font-size: 2.5rem;
          margin-bottom: 1rem;
        }
        
        .card h3 {
          font-size: 1.3rem;
          margin-bottom: 0.5rem;
          color: #fff;
        }
        
        .card p {
          color: #8892b0;
          font-size: 0.95rem;
          line-height: 1.6;
        }
        
        .env-list {
          display: flex;
          justify-content: center;
          gap: 1rem;
          flex-wrap: wrap;
          margin-top: 2rem;
        }
        
        .env-tag {
          padding: 0.75rem 1.5rem;
          background: rgba(255, 255, 255, 0.08);
          border-radius: 8px;
          font-weight: 500;
          transition: all 0.3s;
        }
        
        .env-tag.dev { border-left: 3px solid #00d9ff; }
        .env-tag.integ { border-left: 3px solid #ffd000; }
        .env-tag.preprod { border-left: 3px solid #ff6b6b; }
        .env-tag.prod { border-left: 3px solid #00ff88; }
        
        .env-tag:hover {
          background: rgba(255, 255, 255, 0.15);
          transform: scale(1.05);
        }
        
        footer {
          text-align: center;
          padding: 3rem 0;
          color: #5a6270;
          font-size: 0.9rem;
        }
        
        @keyframes fadeInDown {
          from { opacity: 0; transform: translateY(-30px); }
          to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(30px); }
          to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes gradient {
          0% { background-position: 0% center; }
          100% { background-position: 200% center; }
        }
        
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.7; }
        }
        
        .particles {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          overflow: hidden;
          z-index: -1;
        }
        
        .particle {
          position: absolute;
          width: 4px;
          height: 4px;
          background: rgba(0, 217, 255, 0.5);
          border-radius: 50%;
          animation: float 15s infinite;
        }
        
        @keyframes float {
          0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
      </style>
    </head>
    <body>
      <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 4.5s;"></div>
      </div>
      
      <div class="container">
        <header>
          <h1 class="logo">⚙️ DevOps Central</h1>
          <p class="subtitle">Deployment Automation Hub</p>
          <span class="status-badge">● All Systems Operational</span>
        </header>
        
        <div class="env-list">
          <div class="env-tag dev">🔵 DEV</div>
          <div class="env-tag integ">🟡 INTEG</div>
          <div class="env-tag preprod">🔴 PRE-PROD</div>
          <div class="env-tag prod">🟢 PROD</div>
        </div>
        
        <div class="grid">
          <div class="card" style="animation-delay: 0.1s;">
            <div class="card-icon">🚀</div>
            <h3>Deployments</h3>
            <p>Automated microservices deployment via GitLab CI/CD with Rancher orchestration.</p>
          </div>
          
          <div class="card" style="animation-delay: 0.2s;">
            <div class="card-icon">📦</div>
            <h3>Container Registry</h3>
            <p>Harbor & GitLab registry integration for secure image management.</p>
          </div>
          
          <div class="card" style="animation-delay: 0.3s;">
            <div class="card-icon">🔄</div>
            <h3>GitOps</h3>
            <p>ArgoCD-powered continuous delivery with declarative configuration.</p>
          </div>
          
          <div class="card" style="animation-delay: 0.4s;">
            <div class="card-icon">📊</div>
            <h3>Monitoring</h3>
            <p>Real-time service health tracking across all environments.</p>
          </div>
          
          <div class="card" style="animation-delay: 0.5s;">
            <div class="card-icon">🌍</div>
            <h3>Multi-Region</h3>
            <p>US, EU, and APAC region support with unified management.</p>
          </div>
          
          <div class="card" style="animation-delay: 0.6s;">
            <div class="card-icon">🔐</div>
            <h3>Security</h3>
            <p>Secure deployments with proper RBAC and secrets management.</p>
          </div>
        </div>
        
        <footer>
          <p>DevOps Central • Powered by Kubernetes & ArgoCD</p>
          <p style="margin-top: 0.5rem; color: #3a4250;">v1.0.0</p>
        </footer>
      </div>
    </body>
    </html>
