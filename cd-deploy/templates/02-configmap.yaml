apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.app.namespace }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Apache JMeter Dashboard</title>
      
      <!-- Bootstrap & Font Awesome from CDN -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
      
      <style>
        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
          min-height: 100vh;
          color: #e0e0e0;
        }
        
        .navbar {
          background: rgba(0, 0, 0, 0.3) !important;
          border: none;
          backdrop-filter: blur(10px);
        }
        
        .navbar-brand {
          color: #00d9ff !important;
          font-weight: 700;
          font-size: 1.4rem;
        }
        
        .sidebar-nav li a {
          color: #8892b0 !important;
          transition: all 0.3s;
        }
        
        .sidebar-nav li a:hover,
        .sidebar-nav li a.active {
          background: rgba(0, 217, 255, 0.1) !important;
          color: #00d9ff !important;
          border-left: 3px solid #00d9ff;
        }
        
        #page-wrapper {
          background: transparent;
          padding: 20px;
          margin-left: 250px;
        }
        
        .panel {
          background: rgba(255, 255, 255, 0.05);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          margin-bottom: 20px;
        }
        
        .panel-heading {
          background: rgba(0, 217, 255, 0.1) !important;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px 12px 0 0;
        }
        
        .dashboard-title {
          color: #00d9ff;
          font-weight: 600;
          font-size: 1.1rem;
          margin: 0;
        }
        
        .dashboard-title a {
          color: #00d9ff;
          text-decoration: none;
        }
        
        .panel-body {
          background: transparent;
        }
        
        .table {
          color: #e0e0e0;
        }
        
        .table-bordered {
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-bordered > thead > tr > th,
        .table-bordered > tbody > tr > th,
        .table-bordered > tbody > tr > td {
          border: 1px solid rgba(255, 255, 255, 0.1);
          background: rgba(0, 0, 0, 0.2);
        }
        
        .table-bordered > thead > tr > th {
          background: rgba(0, 217, 255, 0.15);
          color: #00d9ff;
          font-weight: 600;
        }
        
        .table tbody tr:hover td {
          background: rgba(0, 217, 255, 0.1);
        }
        
        /* Status indicators */
        .status-pass { color: #00ff88; font-weight: bold; }
        .status-fail { color: #ff6b6b; font-weight: bold; }
        
        /* Apdex coloring */
        .apdex-excellent { color: #00ff88; }
        .apdex-good { color: #7fff00; }
        .apdex-fair { color: #ffd000; }
        .apdex-poor { color: #ff8c00; }
        .apdex-unacceptable { color: #ff6b6b; }
        
        /* Summary cards */
        .summary-card {
          background: rgba(255, 255, 255, 0.05);
          border-radius: 12px;
          padding: 20px;
          text-align: center;
          border: 1px solid rgba(255, 255, 255, 0.1);
          margin-bottom: 15px;
        }
        
        .summary-card .value {
          font-size: 2.5rem;
          font-weight: 700;
          color: #00d9ff;
        }
        
        .summary-card .label {
          color: #8892b0;
          font-size: 0.9rem;
          margin-top: 5px;
        }
        
        .summary-card.success .value { color: #00ff88; }
        .summary-card.warning .value { color: #ffd000; }
        .summary-card.danger .value { color: #ff6b6b; }
        
        /* Pie chart container */
        .pie-container {
          width: 200px;
          height: 200px;
          margin: 0 auto;
          position: relative;
        }
        
        .pie-chart {
          width: 100%;
          height: 100%;
          border-radius: 50%;
          background: conic-gradient(#00ff88 0% 100%, #ff6b6b 100% 100%);
          position: relative;
        }
        
        .pie-center {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: #1a1a2e;
          width: 120px;
          height: 120px;
          border-radius: 50%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }
        
        .pie-center .percentage {
          font-size: 1.8rem;
          font-weight: 700;
          color: #00ff88;
        }
        
        .pie-center .label {
          font-size: 0.8rem;
          color: #8892b0;
        }
        
        /* Sidebar */
        .navbar-default .sidebar {
          background: rgba(0, 0, 0, 0.3);
          backdrop-filter: blur(10px);
        }
        
        @media(min-width:768px) {
          .navbar-static-side {
            position: fixed;
            width: 250px;
          }
        }
      </style>
    </head>
    <body>
      <div id="wrapper">
        <nav class="navbar navbar-default navbar-static-top" role="navigation" style="margin-bottom: 0">
          <div class="navbar-header">
            <a class="navbar-brand" href="#">
              <i class="fa fa-dashboard"></i> Apache JMeter Dashboard
            </a>
          </div>
          
          <div class="navbar-default sidebar" role="navigation">
            <div class="sidebar-nav navbar-collapse">
              <ul class="nav" id="side-menu">
                <li>
                  <a href="#" class="active"><i class="fa fa-dashboard fa-fw"></i> Dashboard</a>
                </li>
                <li>
                  <a href="#"><i class="fa fa-bar-chart-o fa-fw"></i> Charts <span class="fa arrow"></span></a>
                  <ul class="nav nav-second-level collapse">
                    <li><a href="#">Over Time</a></li>
                    <li><a href="#">Throughput</a></li>
                    <li><a href="#">Response Times</a></li>
                  </ul>
                </li>
                <li>
                  <a href="#"><i class="fa fa-line-chart fa-fw"></i> Custom Graphs</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
        
        <div id="page-wrapper">
          <!-- Test Info -->
          <div class="row">
            <div class="col-lg-12">
              <div class="panel panel-default">
                <div class="panel-heading" style="text-align:center;">
                  <p class="dashboard-title">Test and Report Information</p>
                </div>
                <div class="panel-body">
                  <table class="table table-bordered table-condensed">
                    <tbody>
                      <tr><td>Source file</td><td>"Visualization.jtl"</td></tr>
                      <tr><td>Start Time</td><td>"4/17/26, 2:16 PM"</td></tr>
                      <tr><td>End Time</td><td>"4/17/26, 2:18 PM"</td></tr>
                      <tr><td>Filter for display</td><td>""</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Summary Cards -->
          <div class="row">
            <div class="col-lg-3 col-md-6">
              <div class="summary-card success">
                <div class="value">11</div>
                <div class="label">Total Samples</div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="summary-card success">
                <div class="value">0</div>
                <div class="label">Errors</div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="summary-card">
                <div class="value">0.09</div>
                <div class="label">Throughput/s</div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="summary-card warning">
                <div class="value">12.4s</div>
                <div class="label">Avg Response</div>
              </div>
            </div>
          </div>
          
          <!-- APDEX and Requests Summary -->
          <div class="row">
            <div class="col-lg-6">
              <div class="panel panel-default" style="text-align:center;">
                <div class="panel-heading">
                  <p class="dashboard-title">
                    <a href="https://en.wikipedia.org/wiki/Apdex" target="_blank">APDEX (Application Performance Index)</a>
                  </p>
                </div>
                <div class="panel-body">
                  <table class="table table-bordered table-condensed">
                    <thead>
                      <tr>
                        <th>Apdex</th>
                        <th>T (Toleration)</th>
                        <th>F (Frustration)</th>
                        <th>Label</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr><td class="apdex-poor">0.318</td><td>500 ms</td><td>1.5 sec</td><td><strong>Total</strong></td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>GETJOBDATA</td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>DMLOGINWBSSESSION</td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>DMLOGOUTWBSSESSION</td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>GENERATEACCESSTOKEN</td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>CREATEWBSSESSION</td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>LOADPART</td></tr>
                      <tr><td class="apdex-unacceptable">0.000</td><td>500 ms</td><td>1.5 sec</td><td>GETCONTEXTID</td></tr>
                      <tr><td class="apdex-fair">0.500</td><td>500 ms</td><td>1.5 sec</td><td>DELETEWBSSESSION</td></tr>
                      <tr><td class="apdex-excellent">1.000</td><td>500 ms</td><td>1.5 sec</td><td>Debug Sampler</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            
            <div class="col-lg-6">
              <div class="panel panel-default" style="text-align:center;">
                <div class="panel-heading">
                  <p class="dashboard-title">Requests Summary</p>
                </div>
                <div class="panel-body">
                  <div class="pie-container">
                    <div class="pie-chart">
                      <div class="pie-center">
                        <span class="percentage">100%</span>
                        <span class="label">PASS</span>
                      </div>
                    </div>
                  </div>
                  <div style="margin-top: 20px;">
                    <span style="color: #00ff88;">● PASS: 11 (100%)</span>
                    <span style="color: #ff6b6b; margin-left: 20px;">● FAIL: 0 (0%)</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Statistics Table -->
          <div class="row">
            <div class="col-lg-12">
              <div class="panel panel-default" style="text-align:center;">
                <div class="panel-heading">
                  <p class="dashboard-title">Statistics</p>
                </div>
                <div class="panel-body">
                  <div class="table-responsive">
                    <table class="table table-bordered table-condensed">
                      <thead>
                        <tr>
                          <th>Label</th>
                          <th>#Samples</th>
                          <th>FAIL</th>
                          <th>Error %</th>
                          <th>Average</th>
                          <th>Min</th>
                          <th>Max</th>
                          <th>Median</th>
                          <th>90th pct</th>
                          <th>95th pct</th>
                          <th>99th pct</th>
                          <th>Trans/s</th>
                          <th>Recv KB/s</th>
                          <th>Sent KB/s</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr style="font-weight: bold; background: rgba(0, 217, 255, 0.1);">
                          <td>Total</td><td>11</td><td class="status-pass">0</td><td class="status-pass">0.00%</td>
                          <td>12414</td><td>0</td><td>56584</td><td>3984</td>
                          <td>55301</td><td>56584</td><td>56584</td><td>0.09</td><td>0.28</td><td>0.13</td>
                        </tr>
                        <tr>
                          <td>CREATEWBSSESSION</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>1650</td><td>1650</td><td>1650</td><td>1650</td>
                          <td>1650</td><td>1650</td><td>1650</td><td>0.61</td><td>0.88</td><td>1.60</td>
                        </tr>
                        <tr>
                          <td>Debug Sampler</td><td>3</td><td>0</td><td>0.00%</td>
                          <td>2</td><td>0</td><td>5</td><td>1</td>
                          <td>5</td><td>5</td><td>5</td><td>0.04</td><td>0.05</td><td>0.00</td>
                        </tr>
                        <tr>
                          <td>DELETEWBSSESSION</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>801</td><td>801</td><td>801</td><td>801</td>
                          <td>801</td><td>801</td><td>801</td><td>1.25</td><td>1.67</td><td>3.29</td>
                        </tr>
                        <tr>
                          <td>DMLOGINWBSSESSION</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>8985</td><td>8985</td><td>8985</td><td>8985</td>
                          <td>8985</td><td>8985</td><td>8985</td><td>0.11</td><td>0.16</td><td>0.29</td>
                        </tr>
                        <tr>
                          <td>DMLOGOUTWBSSESSION</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>4655</td><td>4655</td><td>4655</td><td>4655</td>
                          <td>4655</td><td>4655</td><td>4655</td><td>0.21</td><td>0.26</td><td>0.56</td>
                        </tr>
                        <tr>
                          <td>GENERATEACCESSTOKEN</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>56584</td><td>56584</td><td>56584</td><td>56584</td>
                          <td>56584</td><td>56584</td><td>56584</td><td>0.02</td><td>0.00</td><td>0.00</td>
                        </tr>
                        <tr>
                          <td>GETCONTEXTID</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>3984</td><td>3984</td><td>3984</td><td>3984</td>
                          <td>3984</td><td>3984</td><td>3984</td><td>0.25</td><td>0.61</td><td>0.65</td>
                        </tr>
                        <tr>
                          <td>GETJOBDATA</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>50171</td><td>50171</td><td>50171</td><td>50171</td>
                          <td>50171</td><td>50171</td><td>50171</td><td>0.02</td><td>0.43</td><td>0.00</td>
                        </tr>
                        <tr>
                          <td>LOADPART</td><td>1</td><td>0</td><td>0.00%</td>
                          <td>9720</td><td>9720</td><td>9720</td><td>9720</td>
                          <td>9720</td><td>9720</td><td>9720</td><td>0.10</td><td>0.14</td><td>0.29</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Errors Table -->
          <div class="row">
            <div class="col-lg-12">
              <div class="panel panel-default" style="text-align:center;">
                <div class="panel-heading">
                  <p class="dashboard-title">Errors</p>
                </div>
                <div class="panel-body">
                  <div class="table-responsive">
                    <table class="table table-bordered table-condensed">
                      <thead>
                        <tr>
                          <th>Type of error</th>
                          <th>Number of errors</th>
                          <th>% in errors</th>
                          <th>% in all samples</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td colspan="4" style="text-align: center; color: #00ff88;">
                            <i class="fa fa-check-circle"></i> No errors recorded
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Top 5 Errors -->
          <div class="row">
            <div class="col-lg-12">
              <div class="panel panel-default" style="text-align:center;">
                <div class="panel-heading">
                  <p class="dashboard-title">Top 5 Errors by Sampler</p>
                </div>
                <div class="panel-body">
                  <div class="table-responsive">
                    <table class="table table-bordered table-condensed">
                      <thead>
                        <tr>
                          <th>Sample</th>
                          <th>#Samples</th>
                          <th>#Errors</th>
                          <th colspan="10">Error Details</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr style="font-weight: bold;">
                          <td>Total</td>
                          <td>11</td>
                          <td class="status-pass">0</td>
                          <td colspan="10" style="text-align: center; color: #00ff88;">
                            <i class="fa fa-check-circle"></i> All samples passed
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Footer -->
          <div class="row" style="margin-top: 30px;">
            <div class="col-lg-12 text-center" style="color: #5a6270;">
              <p>Apache JMeter Dashboard • Generated on 4/17/26</p>
              <p style="font-size: 0.8rem;">Powered by JMeter Report Generator</p>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Scripts -->
      <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
      <script>
        $(document).ready(function() {
          // Toggle sidebar submenus
          $('.sidebar-nav a').click(function(e) {
            if ($(this).next('.nav-second-level').length) {
              e.preventDefault();
              $(this).next('.nav-second-level').toggleClass('collapse');
            }
          });
        });
      </script>
    </body>
    </html>
